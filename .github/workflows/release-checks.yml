name: Release checks

on:
  pull_request:
    branches:
      - release

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "Checking PR title: $TITLE"

          if [[ ! "$TITLE" =~ ^Release\ [0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::PR title must be exactly 'Release X.Y.Z' (e.g., 'Release 1.2.3')"
            exit 1
          fi

          echo "PR title is valid."

  diff-check:
    name: Verify diff matches main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff with main
        run: |
          git fetch origin main

          DIFF=$(git diff origin/main..HEAD)

          if [ -n "$DIFF" ]; then
            echo "::error::PR branch has changes that differ from main. The release branch must contain exactly what is in main."
            echo "Diff:"
            echo "$DIFF"
            exit 1
          fi

          echo "PR branch matches main exactly."

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Check formatting
        run: ./Submodules/luau-cicd/Scripts/CheckFormatting.luau

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install dependencies
        run: wally install

      - name: Run tests
        run: ./Scripts/RunTests.luau

  analyze:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install dependencies
        run: wally install

      - name: Setup Lune typedefs
        run: lune setup --no-update-luaurc

      - name: Generate version module
        run: ./Scripts/GenerateVersion.luau

      - name: Run static analysis
        run: ./Submodules/luau-cicd/Scripts/RunStaticAnalysis.luau lune

  json-format:
    name: Check JSON format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install -g prettier

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Check JSON format
        run: ./Submodules/luau-cicd/Scripts/CheckJsonFormat.luau

  version:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Check version update
        run: ./Submodules/luau-cicd/Scripts/EnsureProperVersionUpdate.luau

      - name: Check version match
        run: ./Submodules/luau-cicd/Scripts/CheckVersionMatch.luau

      - name: Check changelog entry
        run: ./Submodules/luau-cicd/Scripts/CheckChangelogVersion.luau

      - name: Check changelog format
        run: ./Submodules/luau-cicd/Scripts/CheckChangelogFormat.luau

      - name: Verify PR title matches VERSION
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          EXPECTED_TITLE="Release $VERSION"
          ACTUAL_TITLE="${{ github.event.pull_request.title }}"

          if [ "$EXPECTED_TITLE" != "$ACTUAL_TITLE" ]; then
            echo "::error::PR title '$ACTUAL_TITLE' does not match VERSION file. Expected '$EXPECTED_TITLE'"
            exit 1
          fi

          echo "PR title matches VERSION file."

  build-test:
    name: Build test ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x86_64
          - linux-aarch64
          - macos-x86_64
          - macos-aarch64
          - windows-x86_64
          - windows-aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install tooling
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install packages
        run: wally install

      - name: Build
        run: ./Scripts/BuildExecutable.luau ${{ matrix.target }}
