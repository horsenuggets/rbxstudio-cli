[package]
name = "horsenuggets/rbxstudio-cli"
description = "A feature-rich CLI for launching Roblox Studio with various configurations."
version = "1.0.2"
private = true
license = "MIT"
realm = "shared"
registry = "https://github.com/UpliftGames/wally-index"
repository = "https://github.com/horsenuggets/rbxstudio-cli"
include = [
    "default.project.json",
    "init.luau",
    "LICENSE",
    "README.md",
    "Source",
    "Source/**",
    "wally.toml",
]
exclude = ["**"]

[dependencies]
Chalk = "horsenuggets/chalk-luau@1.0.2"
Commandline = "horsenuggets/commandline-luau@0.2.3"
t = "horsenuggets/t@3.1.1-horse.0.5"

[dev-dependencies]
Testable = "horsenuggets/testable@1.1.4"
